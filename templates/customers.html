{% extends 'base.html' %}{% block content %}<h2>Customers</h2><form method='post' class='grid panel'><input name='customer_name' placeholder='Customer / Company' required><input name='contact_name' placeholder='Contact name'><input name='phone' placeholder='Phone'><input name='email' placeholder='Email'><input name='billing_address' placeholder='Billing address'><input name='city' placeholder='City'><input name='state' value='IN' placeholder='State'><input name='zip' placeholder='ZIP'><input name='wave_customer_id' placeholder='Wave customer ID'><textarea name='notes' placeholder='Notes'></textarea><button type='submit'>Add Customer</button></form><table><tr><th>Customer</th><th>Contact</th><th>Phone</th><th>Email</th><th>Wave ID</th></tr>{% for r in customers %}<tr><td>{{ r.customer_name }}</td><td>{{ r.contact_name }}</td><td>{{ r.phone }}</td><td>{{ r.email }}</td><td>{{ r.wave_customer_id or '' }}</td></tr>{% endfor %}</table>{% endblock %}
