{% extends 'base.html' %}{% block content %}<h2>Employees</h2><form method='post' class='grid panel'><input name='first_name' placeholder='First name' required><input name='last_name' placeholder='Last name' required><input name='phone' placeholder='Phone'><input name='email' placeholder='Email'><input name='mailing_address' placeholder='Mailing address'><input name='hourly_rate' type='number' step='0.01' placeholder='Hourly rate'><input name='cash_rate' type='number' step='0.01' placeholder='Cash rate'><input name='position' placeholder='Position'><input name='temp_password' placeholder='Temp password'><button type='submit'>Add Employee</button></form><table><tr><th>Name</th><th>Position</th><th>Phone</th><th>Email</th><th>Hourly</th><th>Cash</th></tr>{% for r in employees %}<tr><td>{{ r.first_name }} {{ r.last_name }}</td><td>{{ r.position }}</td><td>{{ r.phone }}</td><td>{{ r.email }}</td><td>${{ '%.2f'|format(r.hourly_rate or 0) }}</td><td>${{ '%.2f'|format(r.cash_rate or 0) }}</td></tr>{% endfor %}</table>{% endblock %}
