{% extends 'base.html' %}{% block content %}<h2>Work Orders</h2><form method='post' class='grid panel'><input name='work_order_no' placeholder='WO number (optional)'><select name='job_id'>{% for j in jobs %}<option value='{{ j.id }}'>{{ j.job_number }}</option>{% endfor %}</select><input type='date' name='issue_date' value='{{ today }}'><input name='requested_by' placeholder='Requested by'><input name='status' value='Open' placeholder='Status'><input type='date' name='scheduled_date'><textarea name='scope_of_work' placeholder='Scope of work'></textarea><textarea name='notes' placeholder='Notes'></textarea><button type='submit'>Save Work Order</button></form><table><tr><th>WO #</th><th>Job</th><th>Issue Date</th><th>Status</th><th>Requested By</th><th>Scope</th></tr>{% for r in rows %}<tr><td>{{ r.work_order_no }}</td><td>{{ r.job_number }}</td><td>{{ r.issue_date }}</td><td>{{ r.status }}</td><td>{{ r.requested_by }}</td><td>{{ r.scope_of_work }}</td></tr>{% endfor %}</table>{% endblock %}
